name: EAS Update – Auto Deploy to Staging

on:
  push:
    branches:
      - main          # Every push to main auto-deploys to the staging channel

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "EXPO_TOKEN is missing in GitHub repository secrets."
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Publish update to staging channel
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
        env:
          CI: "1"

      - name: Run EAS Update
        run: |
          eas update \
            --branch staging \
            --message "Auto-deploy from commit ${{ github.sha }} by ${{ github.actor }}" \
            --platform all \
            --non-interactive
        env:
          CI: "1"
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
